title: Yannick Morgenthaler
tagline: Macher von Dingen — Code, Hardware und alles dazwischen.
description: >-
  Persönliches Portfolio. Code-Projekte, Hardware-Bauten und ein laufendes
  Protokoll dessen, woran ich gerade arbeite.
author: Yannick Morgenthaler
email: yannick.morgenthaler@4058.net
github_username: LastAdmin

url: "https://lastadmin.github.io"
baseurl: ""

markdown: kramdown
highlighter: rouge
permalink: /:title/

collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .sass-cache
  - .jekyll-cache
  - node_modules

sass:
  style: compressed
